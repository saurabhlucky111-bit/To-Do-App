<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dom Manipulation</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <h1>📝 To-Do App</h1>

      <div class="input-box">
        <input type="text" placeholder="Add a task..." />
        <button>Add</button>
      </div>
      <input id="search" type="text" placeholder="🔍 Search Task..." />

      <div class="filter-task">
        <button class="filter-btn" id="all-btn">All</button>
        <button class="filter-btn" id="completed-btn">Completed</button>
        <button class="filter-btn" id="pending-btn">Pending</button>
      </div>

      <div class="stats">
        <h3 id="total-task"></h3>
        <h3 id="comp-task"></h3>
        <h3 id="rem-task"></h3>
      </div>

      <div id="container"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
